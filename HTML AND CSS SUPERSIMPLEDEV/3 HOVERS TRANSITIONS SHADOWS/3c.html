<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button {
            background-color: rgb(46, 164, 79);
            color: white;
            height: 40px;
            width: 100px;
            border: none;
            border-radius: 5px;
            transition: box-shadow 0.2s;
        }
        button:hover {
            box-shadow: 0px 3px 10px rgb(153, 153, 153);
        }
    </style>
</head>
<body>
    <button>
        Sign Up
    </button>
</body>
</html>
