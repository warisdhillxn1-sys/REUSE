<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .s-button {
            background-color: rgb(204, 0, 0);
            color: white;
            border-style: solid;
            border-radius: 2px;
            border: none;
            height: 36px;
            width: 110px;
            cursor: pointer;
            transition: background-color 0.15s;
        }
        .s-button:hover {
            background-color: rgba(204, 0, 0, 0.6);
        }
        .s-button:active {
            background-color: rgba(204, 0, 0, 0.4);

        }
        .j-button {
            color: rgb(6, 95, 212);
            border: 1px;
            border-radius: 2px;
            border-color: rgb(6, 95, 212);
            cursor: pointer;
            border-style: solid;
            height: 36px;
            width: 70px;
            margin-left: 10px;
            transition: color 0.5s,
                        bachground-color 0.5s;
        }
        .j-button:hover {
            color: white;
            background-color: rgb(6, 95, 212);

        }
        .t-button {
            color: white;
            background-color: rgb(29, 155, 240);
            border-radius: 30px;
            border-style: solid;
            border: none;
            height: 36px;
            width: 70px;
            margin-left: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: box-shadow 0.2s;
        }
        .t-button:hover {
            box-shadow: 0px 4px 4px rgba(192, 192, 192, 0.6);
        }
        .t-button:active {
            opacity: 0.6;
        }
    </style>
</head>
<body>
        <button class="s-button">
            SUBSCRIBE
        </button>
        <button class="j-button">
            JOIN
        </button>
        <button class="t-button">
            Tweet
        </button>
</body>
</html>
