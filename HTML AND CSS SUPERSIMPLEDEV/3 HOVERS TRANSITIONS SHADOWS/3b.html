<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button {
            background-color: rgb(255, 216, 20);
            color: black;
            height: 4px;
            border: none;
            border-radius: 30px;
            width: 150px;
            cursor: pointer;
            transition: background-color 0.15s;
        }
        button:hover {
            background-color: rgb(170, 146, 30);
        }
    </style>
</head>
<body>
    <button>
        Add to Cart
    </button>
</body>
</html>
