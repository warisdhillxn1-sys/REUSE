<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
    <style>
        .first {
            background-color: rgb(10, 102, 194);
            color: white;
            height: 40px;

            border-style: solid;

        }
    </style>

<body>
    <button class="first">
        Apply on company website
    </button>
    <button class="second">
        Save
    </button>
</body>
</html>
