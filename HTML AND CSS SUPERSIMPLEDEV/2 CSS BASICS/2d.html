<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .g-button {
            background-color: rgb(121, 82, 179);
            color: white;
            border: none;
            border-radius: 5px;
            height: 40px;
            width: 100px;
        }
        .d-button {
            color: rgb(108, 117, 125);
            height: 40px;
            width: 100px;
            border: 1px;
            border-style: solid;
            border-color: rgb(108, 117, 125);
            border-radius: 5px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <button class="g-button">
        Get Started
    </button>
    <button class="d-button">
        Download
    </button>
</body>
</html>
