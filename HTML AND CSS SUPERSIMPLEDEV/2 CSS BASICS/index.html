<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .s-button {
            background-color: rgb(204, 0, 0);
            color: white;
            border-style: solid;
            border-radius: 2px;
            border: none;
            height: 36px;
            width: 110px;
            cursor: pointer;
        }
        .j-button {
            color: rgb(6, 95, 212);
            border: 1px;
            border-radius: 2px;
            border-color: rgb(6, 95, 212);
            cursor: pointer;
            border-style: solid;
            height: 36px;
            width: 70px;
            margin-left: 10px;
        }
        .t-button {
            color: white;
            background-color: rgb(29, 155, 240);
            border-radius: 30px;
            border-style: solid;
            border: none;
            height: 36px;
            width: 70px;
            margin-left: 10px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
        <button class="s-button">
            SUBSCRIBE
        </button>
        <button class="j-button">
            JOIN
        </button>
        <button class="t-button">
            Tweet
        </button>
</body>
</html>
