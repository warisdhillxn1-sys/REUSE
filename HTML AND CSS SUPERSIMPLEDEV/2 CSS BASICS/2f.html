<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .link {
            color: rgb(0, 113, 133);
        }
        .nike {
            font-weight: bold;
            font-size: 25px;
        }
        .stock {
            color: rgb(0, 118, 0);
            font-weight: bold;
            font-size: 15px;
        }
        .add {
            background-color: rgb(255, 216, 20);
            border: none;
            border-radius: 30px;
            height: 30px;
            width: 100px;
        }
        .buy {
            background-color: rgb(255, 164, 28);
            border: none;
            border-radius: 30px;
            height: 30px;
            width: 100px;
        }
    </style>
</head>
<body>
    <a href class="link">
        Back To Amazon
    </a>
    <p class="nike">
        Nike Black Running Shoes
    </p>
    <p class="stock">
        $39 - in stock.
    </p>
    <p class="free">
        Free Delivery Tommorow
    </p>
    <button class="add">
        Add to cart
    </button>
    <button class="buy">
        Buy Now
    </button>
</body>
</html>
